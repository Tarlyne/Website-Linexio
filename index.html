    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind Play CDN für sofortiges Styling auch ohne lokalen Build-Server -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#ecfeff',
                100: '#cffafe',
                200: '#a5f3fc',
                300: '#67e8f9',
                400: '#22d3ee',
                500: '#06b6d4',
                600: '#0891b2',
                700: '#0e7490',
                800: '#155e75',
                900: '#164e63',
                950: '#083344',
              },
              dark: {
                800: '#1f2937',
                900: '#111827',
                950: '#030712',
              }
            },
            boxShadow: {
              'glow': '0 0 50px 5px rgba(8, 145, 178, 0.25)',
            },
            animation: {
              'aurora': 'aurora 20s linear infinite',
            },
            keyframes: {
              aurora: {
                '0%': { backgroundPosition: '50% 50%, 50% 50%' },
                '100%': { backgroundPosition: '350% 50%, 350% 50%' },
              }
            }
          }
        }
      }
    </script>

    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply bg-dark-900 text-slate-100 min-h-screen overflow-x-hidden;
          background: radial-gradient(circle at 25% 25%, #1D2433 0%, #111827 60%);
          background-attachment: fixed;
        }
      }
      @layer components {
        .glossy-bar {
          @apply relative overflow-hidden;
        }
        .glossy-bar::after {
          content: '';
          @apply absolute top-0 left-0 right-0 h-1/2 pointer-events-none;
          background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
        }
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        @apply bg-dark-900;
      }
      ::-webkit-scrollbar-thumb {
        @apply bg-slate-700 rounded-full;
      }
    </style>

<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linexio - Ihr Unterricht. Ihre Daten.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              // Linexio 'Aurora Nocturne' Theme Mappings
              brand: {
                50: '#ecfeff',
                100: '#cffafe',
                200: '#a5f3fc',
                300: '#67e8f9',
                400: '#22d3ee', // Accent Text
                500: '#06b6d4',
                600: '#0891b2', // Accent Primary
                700: '#0e7490', // Hover
                800: '#155e75',
                900: '#164e63',
                950: '#083344',
              },
              dark: {
                800: '#1f2937', // UI Primary
                900: '#111827', // Background
                950: '#030712', // Deep Background
              }
            },
            boxShadow: {
              'glow': '0 0 50px 5px rgba(8, 145, 178, 0.25)',
            },
            animation: {
              'aurora': 'aurora 20s linear infinite',
            },
            keyframes: {
              aurora: {
                '0%': { backgroundPosition: '50% 50%, 50% 50%' },
                '100%': { backgroundPosition: '350% 50%, 350% 50%' },
              }
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --color-background: #111827;
        --color-text-primary: #f3f4f6;
        --color-shadow: 8, 145, 178;
      }
      body {
        /* The Single Canvas Gradient */
        background: radial-gradient(circle at 25% 25%, #1D2433 0%, #111827 60%);
        background-attachment: fixed; /* Ensures gradient stays in place while scrolling */
        color: var(--color-text-primary);
        overflow-x: hidden;
        min-height: 100vh;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #111827;
      }
      ::-webkit-scrollbar-thumb {
        background: #374151;
        border-radius: 3px;
      }
      
      /* Glossy Effect from Brand Bible */
      .glossy-bar {
        position: relative;
        overflow: hidden;
      }
      .glossy-bar::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 50%;
        background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
        pointer-events: none;
      }
    </style>

{

    "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.25",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react/": "https://aistudiocdn.com/react@^19.2.1/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
